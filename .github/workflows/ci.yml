name: ci

on:
  push:
    paths-ignore:
    - 'site/**'
    - 'img/**'
    - 'changelog.md'
    - 'readme.md'
  pull_request:

jobs:
  build:
    uses: xoofx/.github/.github/workflows/dotnet.yml@main
    with:
      # so the signing happens
      runs-on: 'windows-latest'
    secrets:
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}